    <circle cx="2110" cy="330" r="140" fill="#fb923c" filter="url(#soft)" />
    <circle cx="1760" cy="330" r="120" fill="#22d3ee" filter="url(#soft)" />
    <circle cx="2220" cy="220" r="120" fill="#a78bfa" filter="url(#soft)" />
  </g>

  <g opacity="0.22" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="10">
