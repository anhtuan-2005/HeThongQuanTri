<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1600" viewBox="0 0 2400 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1b2e" />
      <stop offset="0.55" stop-color="#0b1220" />
      <stop offset="1" stop-color="#070a12" />
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0" />
      <stop offset="0.6" stop-color="#0b1220" stop-opacity="0.25" />
      <stop offset="1" stop-color="#050711" stop-opacity="0.85" />
    </linearGradient>
    <radialGradient id="bokeh1" cx="78%" cy="28%" r="46%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.30" />
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bokeh2" cx="92%" cy="18%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.22" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bokeh3" cx="86%" cy="36%" r="42%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.24" />
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="0.55" stop-color="#60a5fa" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="2400" height="1600" fill="url(#bg)" />
  <rect width="2400" height="1600" fill="url(#bokeh1)" />
  <rect width="2400" height="1600" fill="url(#bokeh2)" />
  <rect width="2400" height="1600" fill="url(#bokeh3)" />

  <g opacity="0.28">
